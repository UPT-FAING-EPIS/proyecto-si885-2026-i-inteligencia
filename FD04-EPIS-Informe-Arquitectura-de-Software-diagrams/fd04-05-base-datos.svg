<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">

<style>
.box { fill: #f8fafc; stroke: #1f2937; stroke-width: 1.4; rx: 8; }
.box2 { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.4; rx: 8; }
.box3 { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.4; rx: 8; }
.box4 { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.4; rx: 8; }
.text { font-family: Arial, sans-serif; font-size: 13px; fill: #111827; }
.title { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
.small { font-family: Arial, sans-serif; font-size: 11px; fill: #374151; }
.line { stroke: #374151; stroke-width: 1.5; marker-end: url(#arrow); fill: none; }
.dashed { stroke: #6b7280; stroke-width: 1.3; stroke-dasharray: 5 4; marker-end: url(#arrow); fill: none; }
</style>

<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#374151" /></marker></defs>
<rect x="0" y="0" width="1100" height="720" fill="#ffffff" />
<text x="24" y="32" class="title">Diagrama de base de datos obtenido de SQLite</text>
<rect x="80" y="90" width="390" height="250" class="box4" />
<text x="92" y="114" class="text">publicaciones</text>
<text x="92" y="131" class="small">id INTEGER PK</text>
<text x="92" y="148" class="small">estudiante TEXT NOT NULL</text>
<text x="92" y="165" class="small">ciclo TEXT NOT NULL</text>
<text x="92" y="182" class="small">red_social TEXT NOT NULL</text>
<text x="92" y="199" class="small">formato TEXT NOT NULL</text>
<text x="92" y="216" class="small">fecha TEXT NOT NULL</text>
<text x="92" y="233" class="small">alcance INTEGER NOT NULL</text>
<text x="92" y="250" class="small">interacciones INTEGER NOT NULL</text>
<rect x="620" y="130" width="350" height="180" class="box4" />
<text x="632" y="154" class="text">usuarios</text>
<text x="632" y="171" class="small">id INTEGER PK</text>
<text x="632" y="188" class="small">estudiante TEXT NOT NULL</text>
<text x="632" y="205" class="small">username TEXT NOT NULL UNIQUE</text>
<text x="632" y="222" class="small">password_hash TEXT NOT NULL</text>
<text x="632" y="239" class="small">rol TEXT DEFAULT estudiante</text>
<line x1="620" y1="220" x2="470" y2="220" class="dashed" />
<text x="500" y="210" class="small">relaci?n l?gica por estudiante</text>
<rect x="80" y="420" width="890" height="120" class="box" />
<text x="92" y="444" class="text">Origen del esquema</text>
<text x="92" y="461" class="small">epis_data.db introspectado con PRAGMA table_info; tablas creadas por SQLitePublicacionRepository y SQLiteUsuarioRepository.</text>
<text x="92" y="478" class="small">No existe clave for?nea f?sica; la relaci?n entre publicaciones y usuarios se realiza por el nombre del estudiante en el prototipo.</text>
</svg>
