<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">

<style>
.box { fill: #f8fafc; stroke: #1f2937; stroke-width: 1.4; rx: 8; }
.box2 { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.4; rx: 8; }
.box3 { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.4; rx: 8; }
.box4 { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.4; rx: 8; }
.text { font-family: Arial, sans-serif; font-size: 13px; fill: #111827; }
.title { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
.small { font-family: Arial, sans-serif; font-size: 11px; fill: #374151; }
.line { stroke: #374151; stroke-width: 1.5; marker-end: url(#arrow); fill: none; }
.dashed { stroke: #6b7280; stroke-width: 1.3; stroke-dasharray: 5 4; marker-end: url(#arrow); fill: none; }
</style>

<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#374151" /></marker></defs>
<rect x="0" y="0" width="1100" height="720" fill="#ffffff" />
<text x="24" y="32" class="title">Diagrama de componentes</text>
<rect x="60" y="130" width="210" height="130" class="box2" />
<text x="72" y="154" class="text">Angular App</text>
<text x="72" y="171" class="small">Login, Perfil, Global</text>
<rect x="320" y="130" width="210" height="130" class="box2" />
<text x="332" y="154" class="text">AuthClientService</text>
<text x="332" y="171" class="small">DashboardClientService</text>
<rect x="580" y="130" width="210" height="130" class="box3" />
<text x="592" y="154" class="text">FastAPI</text>
<text x="592" y="171" class="small">Auth routes</text>
<text x="592" y="188" class="small">Dashboard routes</text>
<rect x="580" y="360" width="210" height="130" class="box3" />
<text x="592" y="384" class="text">Service Layer</text>
<text x="592" y="401" class="small">AuthService</text>
<text x="592" y="418" class="small">AnalyticsService</text>
<rect x="840" y="360" width="210" height="130" class="box4" />
<text x="852" y="384" class="text">Repository Layer</text>
<text x="852" y="401" class="small">SQLite repositories</text>
<rect x="840" y="130" width="210" height="130" class="box4" />
<text x="852" y="154" class="text">SQLite DB</text>
<text x="852" y="171" class="small">epis_data.db</text>
<line x1="270" y1="195" x2="320" y2="195" class="line" />
<line x1="530" y1="195" x2="580" y2="195" class="line" />
<line x1="790" y1="195" x2="840" y2="195" class="line" />
<line x1="685" y1="260" x2="685" y2="360" class="line" />
<line x1="790" y1="425" x2="840" y2="425" class="line" />
</svg>
