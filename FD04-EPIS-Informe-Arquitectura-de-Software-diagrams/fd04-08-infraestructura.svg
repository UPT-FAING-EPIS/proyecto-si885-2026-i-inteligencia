<text x="82" y="371" class="small">aws_security_group.api</text>
<line x1="280" y1="220" x2="330" y2="145" class="line" />
<line x1="540" y1="145" x2="600" y2="145" class="line" />
<line x1="280" y1="235" x2="330" y2="375" class="line" />
<line x1="540" y1="375" x2="600" y2="395" class="line" />
<line x1="280" y1="395" x2="330" y2="395" class="line" />
