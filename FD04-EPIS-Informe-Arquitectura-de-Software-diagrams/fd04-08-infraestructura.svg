<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">

<style>
.box { fill: #f8fafc; stroke: #1f2937; stroke-width: 1.4; rx: 8; }
.box2 { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.4; rx: 8; }
.box3 { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.4; rx: 8; }
.box4 { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.4; rx: 8; }
.text { font-family: Arial, sans-serif; font-size: 13px; fill: #111827; }
.title { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
.small { font-family: Arial, sans-serif; font-size: 11px; fill: #374151; }
.line { stroke: #374151; stroke-width: 1.5; marker-end: url(#arrow); fill: none; }
.dashed { stroke: #6b7280; stroke-width: 1.3; stroke-dasharray: 5 4; marker-end: url(#arrow); fill: none; }
</style>

<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#374151" /></marker></defs>
<rect x="0" y="0" width="1100" height="720" fill="#ffffff" />
<text x="24" y="32" class="title">Diagrama de infraestructura obtenido de Terraform</text>
<rect x="70" y="170" width="210" height="130" class="box2" />
<text x="82" y="194" class="text">Usuario / Navegador</text>
<text x="82" y="211" class="small">Angular</text>
<rect x="330" y="80" width="210" height="130" class="box2" />
<text x="342" y="104" class="text">CloudFront</text>
<text x="342" y="121" class="small">aws_cloudfront_distribution</text>
<rect x="600" y="80" width="210" height="130" class="box4" />
