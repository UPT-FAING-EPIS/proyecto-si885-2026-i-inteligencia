<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="980" viewBox="0 0 1180 980" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama de actividades del proceso propuesto</title>
  <desc id="desc">Flujo propuesto para autenticarse en EPIS Analytics, consultar dashboards y aplicar filtros.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 28px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 400 15px Arial, sans-serif; }
      .start { fill: #0f172a; stroke: #0f172a; stroke-width: 2; }
      .end { fill: #ffffff; stroke: #0f172a; stroke-width: 5; }
      .end-dot { fill: #0f172a; }
      .step { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .system { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 16; }
      .success { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 16; }
      .warn { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 16; }
      .decision { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; }
      .line { stroke: #64748b; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #94a3b8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .label { fill: #334155; font: 700 13px Arial, sans-serif; }
      .text { fill: #0f172a; font: 700 16px Arial, sans-serif; }
      .text-sm { fill: #334155; font: 400 13px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1180" height="980" rx="22"/>
  <text class="title" x="590" y="48" text-anchor="middle">Diagrama de Actividades del Proceso Propuesto</text>
  <text class="subtitle" x="590" y="74" text-anchor="middle">Consulta centralizada mediante EPIS Analytics</text>

  <circle class="start" cx="590" cy="116" r="18"/>
  <path class="line" d="M590 134 L590 166"/>

  <rect class="step" x="390" y="166" width="400" height="62"/>
  <text class="text" x="590" y="192" text-anchor="middle">Usuario abre EPIS Analytics</text>
  <text class="text-sm" x="590" y="213" text-anchor="middle">Ingresa desde el navegador</text>

  <path class="line" d="M590 228 L590 258"/>
  <rect class="system" x="390" y="258" width="400" height="62"/>
  <text class="text" x="590" y="284" text-anchor="middle">Sistema carga lista de estudiantes</text>
  <text class="text-sm" x="590" y="305" text-anchor="middle">Consulta endpoint público de estudiantes</text>

  <path class="line" d="M590 320 L590 350"/>
  <rect class="step" x="390" y="350" width="400" height="62"/>
  <text class="text" x="590" y="376" text-anchor="middle">Usuario ingresa credenciales</text>
  <text class="text-sm" x="590" y="397" text-anchor="middle">Selecciona estudiante y contraseña</text>

  <path class="line" d="M590 412 L590 442"/>
  <polygon class="decision" points="590,442 760,510 590,578 420,510"/>
  <text class="text" x="590" y="502" text-anchor="middle">¿Credenciales</text>
  <text class="text" x="590" y="524" text-anchor="middle">válidas?</text>

  <path class="line" d="M760 510 L865 510"/>
  <text class="label" x="812" y="496" text-anchor="middle">No</text>
  <rect class="warn" x="865" y="472" width="240" height="76"/>
  <text class="text" x="985" y="501" text-anchor="middle">Muestra mensaje</text>
  <text class="text-sm" x="985" y="524" text-anchor="middle">de credenciales inválidas</text>
  <path class="line-soft" d="M985 548 L985 620 L790 620"/>
  <text class="label" x="928" y="606" text-anchor="middle">permanece en login</text>

  <path class="line" d="M590 578 L590 620"/>
  <text class="label" x="618" y="602" text-anchor="middle">Sí</text>
  <rect class="success" x="390" y="620" width="400" height="66"/>
  <text class="text" x="590" y="648" text-anchor="middle">AuthService genera token</text>
  <text class="text-sm" x="590" y="670" text-anchor="middle">Angular guarda sesión y habilita rutas privadas</text>

  <path class="line" d="M590 686 L590 716"/>
  <rect class="system" x="390" y="716" width="400" height="66"/>
  <text class="text" x="590" y="744" text-anchor="middle">Consulta dashboard personal</text>
  <text class="text-sm" x="590" y="766" text-anchor="middle">Métricas personales y gráficos por red social</text>

  <path class="line" d="M590 782 L590 812"/>
  <path class="line-soft" d="M590 812 L285 812 L285 850"/>
  <path class="line-soft" d="M590 812 L590 850"/>
  <path class="line-soft" d="M590 812 L895 812 L895 850"/>

  <rect class="system" x="115" y="850" width="340" height="70"/>
  <text class="text" x="285" y="879" text-anchor="middle">Aplica filtro por red social</text>
  <text class="text-sm" x="285" y="901" text-anchor="middle">Todas, LinkedIn, Instagram o YouTube</text>

  <rect class="system" x="480" y="850" width="220" height="70"/>
  <text class="text" x="590" y="879" text-anchor="middle">Renderiza gráficos</text>
  <text class="text-sm" x="590" y="901" text-anchor="middle">ECharts actualiza métricas</text>

  <rect class="system" x="725" y="850" width="340" height="70"/>
  <text class="text" x="895" y="879" text-anchor="middle">Consulta dashboard global</text>
  <text class="text-sm" x="895" y="901" text-anchor="middle">Alcance por ciclo, redes y ranking</text>

  <path class="line-soft" d="M285 920 L285 950 L590 950"/>
  <path class="line-soft" d="M590 920 L590 950"/>
  <path class="line-soft" d="M895 920 L895 950 L590 950"/>
  <circle class="end" cx="590" cy="960" r="18"/>
  <circle class="end-dot" cx="590" cy="960" r="9"/>
</svg>
