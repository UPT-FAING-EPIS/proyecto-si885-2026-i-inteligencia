<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="724" viewBox="0 0 1040 724" role="img" aria-label="HU-07 - Proteccion de rutas privadas con token">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" fill="#2563eb"/></marker>
    <style>
      .bg { fill:#f8fafc; } .title { fill:#0f172a; font:700 24px Arial,sans-serif; }
      .pbox { fill:#ffffff; stroke:#cbd5e1; stroke-width:2; rx:12; } .actor { fill:#ecfeff; stroke:#06b6d4; stroke-width:2; rx:12; }
      .db { fill:#fff7ed; stroke:#f97316; stroke-width:2; rx:12; } .lane { stroke:#cbd5e1; stroke-width:1.5; stroke-dasharray:7 7; }
      .msg { stroke:#2563eb; stroke-width:2.1; fill:none; } .return { stroke:#64748b; stroke-width:2; fill:none; stroke-dasharray:6 5; }
      .ptxt { fill:#0f172a; font:700 12px Arial,sans-serif; } .mtxt { fill:#1e293b; font:400 12px Arial,sans-serif; }
    </style>
  </defs>
  <rect class="bg" width="1040" height="724" rx="18"/>
  <text class="title" x="520.0" y="42" text-anchor="middle">HU-07 - Proteccion de rutas privadas con token</text>

  <rect class="actor" x="60.0" y="76" width="124" height="46"/>
  <text class="ptxt" x="122.0" y="104" text-anchor="middle">Usuario</text>
  <line class="lane" x1="122.0" y1="168" x2="122.0" y2="680"/>
  <rect class="pbox" x="205.0" y="76" width="124" height="46"/>
  <text class="ptxt" x="267.0" y="104" text-anchor="middle">AngularRouter</text>
  <line class="lane" x1="267.0" y1="168" x2="267.0" y2="680"/>
  <rect class="pbox" x="350.0" y="76" width="124" height="46"/>
  <text class="ptxt" x="412.0" y="104" text-anchor="middle">AuthInterceptor</text>
  <line class="lane" x1="412.0" y1="168" x2="412.0" y2="680"/>
  <rect class="pbox" x="495.0" y="76" width="124" height="46"/>
  <text class="ptxt" x="557.0" y="104" text-anchor="middle">DashboardAPI</text>
  <line class="lane" x1="557.0" y1="168" x2="557.0" y2="680"/>
  <rect class="pbox" x="640.0" y="76" width="124" height="46"/>
  <text class="ptxt" x="702.0" y="104" text-anchor="middle">AuthService</text>
  <line class="lane" x1="702.0" y1="168" x2="702.0" y2="680"/>
  <line class="msg" x1="122.0" y1="168" x2="267.0" y2="168" marker-end="url(#arrow)"/>
  <text class="mtxt" x="194.5" y="161" text-anchor="middle">Navega a dashboard</text>
  <line class="msg" x1="267.0" y1="212" x2="412.0" y2="212" marker-end="url(#arrow)"/>
  <text class="mtxt" x="339.5" y="205" text-anchor="middle">Preparar request HTTP</text>
  <path class="msg" d="M412.0 256 C446.0 256 446.0 278 412.0 278" marker-end="url(#arrow)"/>
  <text class="mtxt" x="442.0" y="249" text-anchor="middle">Obtener token de sesion</text>
  <line class="msg" x1="412.0" y1="300" x2="557.0" y2="300" marker-end="url(#arrow)"/>
  <text class="mtxt" x="484.5" y="293" text-anchor="middle">Request con Authorization Bearer</text>
  <line class="msg" x1="557.0" y1="344" x2="702.0" y2="344" marker-end="url(#arrow)"/>
  <text class="mtxt" x="629.5" y="337" text-anchor="middle">verify_token(token)</text>
  <line class="return" x1="702.0" y1="388" x2="557.0" y2="388" marker-end="url(#arrow)"/>
  <text class="mtxt" x="629.5" y="381" text-anchor="middle">Token valido: sesion valida</text>
  <line class="return" x1="557.0" y1="432" x2="412.0" y2="432" marker-end="url(#arrow)"/>
  <text class="mtxt" x="484.5" y="425" text-anchor="middle">Respuesta 200</text>
  <line class="return" x1="412.0" y1="476" x2="122.0" y2="476" marker-end="url(#arrow)"/>
  <text class="mtxt" x="267.0" y="469" text-anchor="middle">Dashboard disponible</text>
  <line class="return" x1="702.0" y1="520" x2="557.0" y2="520" marker-end="url(#arrow)"/>
  <text class="mtxt" x="629.5" y="513" text-anchor="middle">Token ausente/invalido: error</text>
  <line class="return" x1="557.0" y1="564" x2="412.0" y2="564" marker-end="url(#arrow)"/>
  <text class="mtxt" x="484.5" y="557" text-anchor="middle">Respuesta 401</text>
  <line class="return" x1="412.0" y1="608" x2="122.0" y2="608" marker-end="url(#arrow)"/>
  <text class="mtxt" x="267.0" y="601" text-anchor="middle">Acceso denegado</text>
</svg>
