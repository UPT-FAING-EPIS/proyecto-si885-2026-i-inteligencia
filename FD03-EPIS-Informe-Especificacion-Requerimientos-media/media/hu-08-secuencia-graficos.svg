<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="636" viewBox="0 0 1040 636" role="img" aria-label="HU-08 - Visualizacion de metricas con graficos">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" fill="#2563eb"/></marker>
    <style>
      .bg { fill:#f8fafc; } .title { fill:#0f172a; font:700 24px Arial,sans-serif; }
      .pbox { fill:#ffffff; stroke:#cbd5e1; stroke-width:2; rx:12; } .actor { fill:#ecfeff; stroke:#06b6d4; stroke-width:2; rx:12; }
      .db { fill:#fff7ed; stroke:#f97316; stroke-width:2; rx:12; } .lane { stroke:#cbd5e1; stroke-width:1.5; stroke-dasharray:7 7; }
      .msg { stroke:#2563eb; stroke-width:2.1; fill:none; } .return { stroke:#64748b; stroke-width:2; fill:none; stroke-dasharray:6 5; }
      .ptxt { fill:#0f172a; font:700 12px Arial,sans-serif; } .mtxt { fill:#1e293b; font:400 12px Arial,sans-serif; }
    </style>
  </defs>
  <rect class="bg" width="1040" height="636" rx="18"/>
  <text class="title" x="520.0" y="42" text-anchor="middle">HU-08 - Visualizacion de metricas con graficos</text>

  <rect class="actor" x="60.0" y="76" width="124" height="46"/>
  <text class="ptxt" x="122.0" y="104" text-anchor="middle">Usuario</text>
  <line class="lane" x1="122.0" y1="168" x2="122.0" y2="592"/>
  <rect class="pbox" x="205.0" y="76" width="124" height="46"/>
  <text class="ptxt" x="267.0" y="104" text-anchor="middle">DashboardComponent</text>
  <line class="lane" x1="267.0" y1="168" x2="267.0" y2="592"/>
  <rect class="pbox" x="350.0" y="76" width="124" height="46"/>
  <text class="ptxt" x="412.0" y="104" text-anchor="middle">DashboardClient</text>
  <line class="lane" x1="412.0" y1="168" x2="412.0" y2="592"/>
  <rect class="pbox" x="495.0" y="76" width="124" height="46"/>
  <text class="ptxt" x="557.0" y="104" text-anchor="middle">FastAPI</text>
  <line class="lane" x1="557.0" y1="168" x2="557.0" y2="592"/>
  <rect class="pbox" x="640.0" y="76" width="124" height="46"/>
  <text class="ptxt" x="702.0" y="104" text-anchor="middle">AnalyticsService</text>
  <line class="lane" x1="702.0" y1="168" x2="702.0" y2="592"/>
  <rect class="pbox" x="785.0" y="76" width="124" height="46"/>
  <text class="ptxt" x="847.0" y="104" text-anchor="middle">ECharts</text>
  <line class="lane" x1="847.0" y1="168" x2="847.0" y2="592"/>
  <line class="msg" x1="122.0" y1="168" x2="267.0" y2="168" marker-end="url(#arrow)"/>
  <text class="mtxt" x="194.5" y="161" text-anchor="middle">Abre o filtra dashboard</text>
  <line class="msg" x1="267.0" y1="212" x2="412.0" y2="212" marker-end="url(#arrow)"/>
  <text class="mtxt" x="339.5" y="205" text-anchor="middle">Solicitar datos</text>
  <line class="msg" x1="412.0" y1="256" x2="557.0" y2="256" marker-end="url(#arrow)"/>
  <text class="mtxt" x="484.5" y="249" text-anchor="middle">GET dashboard endpoint</text>
  <line class="msg" x1="557.0" y1="300" x2="702.0" y2="300" marker-end="url(#arrow)"/>
  <text class="mtxt" x="629.5" y="293" text-anchor="middle">Calcular metricas y series</text>
  <line class="return" x1="702.0" y1="344" x2="557.0" y2="344" marker-end="url(#arrow)"/>
  <text class="mtxt" x="629.5" y="337" text-anchor="middle">Datos procesados</text>
  <line class="return" x1="557.0" y1="388" x2="412.0" y2="388" marker-end="url(#arrow)"/>
  <text class="mtxt" x="484.5" y="381" text-anchor="middle">Respuesta JSON</text>
  <line class="return" x1="412.0" y1="432" x2="267.0" y2="432" marker-end="url(#arrow)"/>
  <text class="mtxt" x="339.5" y="425" text-anchor="middle">Datos del dashboard</text>
  <line class="msg" x1="267.0" y1="476" x2="847.0" y2="476" marker-end="url(#arrow)"/>
  <text class="mtxt" x="557.0" y="469" text-anchor="middle">Configurar opciones de grafico</text>
  <line class="return" x1="847.0" y1="520" x2="122.0" y2="520" marker-end="url(#arrow)"/>
  <text class="mtxt" x="484.5" y="513" text-anchor="middle">Renderizar visualizaciones</text>
</svg>
