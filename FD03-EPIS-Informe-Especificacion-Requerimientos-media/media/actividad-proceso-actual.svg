<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="860" viewBox="0 0 1180 860" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama de actividades del proceso actual</title>
  <desc id="desc">Flujo actual manual para revisar redes sociales sin dashboard centralizado.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 28px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 400 15px Arial, sans-serif; }
      .start { fill: #0f172a; stroke: #0f172a; stroke-width: 2; }
      .end { fill: #ffffff; stroke: #0f172a; stroke-width: 5; }
      .end-dot { fill: #0f172a; }
      .step { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .manual { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 16; }
      .risk { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; rx: 16; }
      .decision { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; }
      .note { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.6; rx: 12; }
      .line { stroke: #64748b; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #94a3b8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .label { fill: #334155; font: 700 13px Arial, sans-serif; }
      .text { fill: #0f172a; font: 700 16px Arial, sans-serif; }
      .text-sm { fill: #334155; font: 400 13px Arial, sans-serif; }
      .text-xs { fill: #64748b; font: 400 12px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1180" height="860" rx="22"/>
  <text class="title" x="590" y="48" text-anchor="middle">Diagrama de Actividades del Proceso Actual</text>
  <text class="subtitle" x="590" y="74" text-anchor="middle">Revisión manual de indicadores digitales sin EPIS Analytics</text>

  <circle class="start" cx="590" cy="116" r="18"/>
  <path class="line" d="M590 134 L590 166"/>

  <rect class="step" x="390" y="166" width="400" height="66"/>
  <text class="text" x="590" y="194" text-anchor="middle">Docente o responsable identifica estudiantes</text>
  <text class="text-sm" x="590" y="216" text-anchor="middle">Define a quién revisar y qué indicadores observar</text>

  <path class="line" d="M590 232 L590 264"/>
  <rect class="manual" x="390" y="264" width="400" height="66"/>
  <text class="text" x="590" y="292" text-anchor="middle">Busca información en redes sociales</text>
  <text class="text-sm" x="590" y="314" text-anchor="middle">No existe una fuente centralizada</text>

  <path class="line" d="M590 330 L590 360"/>
  <path class="line-soft" d="M590 360 L260 360 L260 402"/>
  <path class="line-soft" d="M590 360 L590 402"/>
  <path class="line-soft" d="M590 360 L920 360 L920 402"/>

  <rect class="manual" x="120" y="402" width="280" height="70"/>
  <text class="text" x="260" y="431" text-anchor="middle">Revisa LinkedIn</text>
  <text class="text-sm" x="260" y="453" text-anchor="middle">Consulta manual de publicaciones</text>

  <rect class="manual" x="450" y="402" width="280" height="70"/>
  <text class="text" x="590" y="431" text-anchor="middle">Revisa Instagram</text>
  <text class="text-sm" x="590" y="453" text-anchor="middle">Consulta manual de interacciones</text>

  <rect class="manual" x="780" y="402" width="280" height="70"/>
  <text class="text" x="920" y="431" text-anchor="middle">Revisa YouTube</text>
  <text class="text-sm" x="920" y="453" text-anchor="middle">Consulta manual de alcance</text>

  <path class="line-soft" d="M260 472 L260 512 L590 512"/>
  <path class="line-soft" d="M590 472 L590 512"/>
  <path class="line-soft" d="M920 472 L920 512 L590 512"/>
  <path class="line" d="M590 512 L590 540"/>

  <rect class="manual" x="390" y="540" width="400" height="66"/>
  <text class="text" x="590" y="568" text-anchor="middle">Anota publicaciones, alcance o interacciones</text>
  <text class="text-sm" x="590" y="590" text-anchor="middle">Registro manual en apuntes u hojas auxiliares</text>

  <path class="line" d="M590 606 L590 636"/>
  <polygon class="decision" points="590,636 760,704 590,772 420,704"/>
  <text class="text" x="590" y="696" text-anchor="middle">¿Información</text>
  <text class="text" x="590" y="718" text-anchor="middle">suficiente?</text>

  <path class="line" d="M760 704 L865 704"/>
  <text class="label" x="812" y="690" text-anchor="middle">Sí</text>
  <rect class="step" x="865" y="666" width="240" height="76"/>
  <text class="text" x="985" y="695" text-anchor="middle">Compara resultados</text>
  <text class="text-sm" x="985" y="718" text-anchor="middle">e interpreta manualmente</text>

  <path class="line" d="M420 704 L315 704"/>
  <text class="label" x="368" y="690" text-anchor="middle">No</text>
  <rect class="risk" x="75" y="666" width="240" height="76"/>
  <text class="text" x="195" y="695" text-anchor="middle">Información incompleta</text>
  <text class="text-sm" x="195" y="718" text-anchor="middle">No se obtiene una visión global</text>

  <path class="line-soft" d="M985 742 L985 800 L590 800"/>
  <path class="line-soft" d="M195 742 L195 800 L590 800"/>

  <rect class="note" x="430" y="770" width="320" height="62"/>
  <text class="text" x="590" y="797" text-anchor="middle">No existe dashboard centralizado</text>
  <text class="text-xs" x="590" y="818" text-anchor="middle">Proceso lento, disperso y propenso a errores</text>

  <circle class="end" cx="590" cy="846" r="18"/>
  <circle class="end-dot" cx="590" cy="846" r="9"/>
</svg>
