<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Organigrama institucional de referencia UPT</title>
  <desc id="desc">Representación gráfica de referencia de la Universidad Privada de Tacna, Facultad de Ingeniería y Escuela Profesional de Ingeniería de Sistemas.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 28px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 400 15px Arial, sans-serif; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .box-main { fill: #0f172a; stroke: #0f172a; stroke-width: 2; rx: 16; }
      .box-govern { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; rx: 14; }
      .box-academic { fill: #ecfeff; stroke: #06b6d4; stroke-width: 2; rx: 14; }
      .box-epis { fill: #dcfce7; stroke: #22c55e; stroke-width: 3; rx: 14; }
      .box-support { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 14; }
      .text-main { fill: #ffffff; font: 700 21px Arial, sans-serif; }
      .text { fill: #0f172a; font: 700 16px Arial, sans-serif; }
      .text-sm { fill: #334155; font: 400 13px Arial, sans-serif; }
      .text-xs { fill: #475569; font: 400 12px Arial, sans-serif; }
      .line { stroke: #94a3b8; stroke-width: 2.4; fill: none; }
      .line-strong { stroke: #22c55e; stroke-width: 3; fill: none; }
      .badge { fill: #e2e8f0; rx: 999; }
      .badge-text { fill: #334155; font: 700 12px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1180" height="760" rx="22"/>

  <text class="title" x="590" y="48" text-anchor="middle">Organigrama Institucional de Referencia</text>
  <text class="subtitle" x="590" y="74" text-anchor="middle">Contextualización del proyecto EPIS Analytics dentro de la UPT, FAING y EPIS</text>

  <rect class="box-main" x="390" y="105" width="400" height="74"/>
  <text class="text-main" x="590" y="136" text-anchor="middle">Universidad Privada de Tacna</text>
  <text class="text-sm" x="590" y="160" text-anchor="middle" fill="#e2e8f0">Organización beneficiaria del proyecto</text>

  <path class="line" d="M590 179 L590 215"/>
  <path class="line" d="M205 215 L975 215"/>
  <path class="line" d="M205 215 L205 245"/>
  <path class="line" d="M405 215 L405 245"/>
  <path class="line" d="M590 215 L590 245"/>
  <path class="line" d="M775 215 L775 245"/>
  <path class="line" d="M975 215 L975 245"/>

  <rect class="box-govern" x="70" y="245" width="270" height="78"/>
  <text class="text" x="205" y="276" text-anchor="middle">Asamblea Universitaria</text>
  <text class="text-sm" x="205" y="300" text-anchor="middle">Máximo organismo normativo</text>

  <rect class="box-govern" x="370" y="245" width="270" height="78"/>
  <text class="text" x="505" y="276" text-anchor="middle">Consejo Universitario</text>
  <text class="text-sm" x="505" y="300" text-anchor="middle">Dirección, ejecución y evaluación</text>

  <rect class="box-support" x="670" y="245" width="220" height="78"/>
  <text class="text" x="780" y="276" text-anchor="middle">Rectorado</text>
  <text class="text-sm" x="780" y="300" text-anchor="middle">Gobierno y gestión universitaria</text>

  <rect class="box-support" x="920" y="245" width="190" height="78"/>
  <text class="text" x="1015" y="276" text-anchor="middle">Escuela de</text>
  <text class="text" x="1015" y="296" text-anchor="middle">Postgrado</text>

  <path class="line" d="M780 323 L780 360"/>
  <path class="line" d="M505 323 L505 360"/>
  <path class="line" d="M505 360 L780 360"/>
  <path class="line" d="M590 360 L590 395"/>

  <rect class="box-academic" x="390" y="395" width="400" height="78"/>
  <text class="text" x="590" y="426" text-anchor="middle">Facultades</text>
  <text class="text-sm" x="590" y="450" text-anchor="middle">Unidades académicas de formación profesional</text>

  <path class="line" d="M590 473 L590 510"/>

  <rect class="box-academic" x="390" y="510" width="400" height="80"/>
  <text class="text" x="590" y="540" text-anchor="middle">Facultad de Ingeniería (FAING)</text>
  <text class="text-sm" x="590" y="564" text-anchor="middle">Ámbito académico directo del proyecto</text>

  <path class="line-strong" d="M590 590 L590 624"/>
  <path class="line" d="M190 624 L990 624"/>
  <path class="line" d="M190 624 L190 650"/>
  <path class="line" d="M390 624 L390 650"/>
  <path class="line-strong" d="M590 624 L590 650"/>
  <path class="line" d="M790 624 L790 650"/>
  <path class="line" d="M990 624 L990 650"/>

  <rect class="box" x="60" y="650" width="260" height="70"/>
  <text class="text" x="190" y="680" text-anchor="middle">Ing. Civil</text>
  <text class="text-xs" x="190" y="702" text-anchor="middle">Escuela profesional</text>

  <rect class="box" x="335" y="650" width="110" height="70"/>
  <text class="text" x="390" y="680" text-anchor="middle">Otras</text>
  <text class="text-xs" x="390" y="702" text-anchor="middle">escuelas</text>

  <rect class="box-epis" x="470" y="642" width="240" height="86"/>
  <text class="text" x="590" y="676" text-anchor="middle">Ingeniería de Sistemas</text>
  <text class="text-sm" x="590" y="700" text-anchor="middle">EPIS</text>
  <rect class="badge" x="526" y="711" width="128" height="22"/>
  <text class="badge-text" x="590" y="727" text-anchor="middle">EPIS Analytics</text>

  <rect class="box" x="735" y="650" width="110" height="70"/>
  <text class="text" x="790" y="680" text-anchor="middle">Otras</text>
  <text class="text-xs" x="790" y="702" text-anchor="middle">escuelas</text>

  <rect class="box" x="860" y="650" width="260" height="70"/>
  <text class="text" x="990" y="680" text-anchor="middle">Ing. Industrial</text>
  <text class="text-xs" x="990" y="702" text-anchor="middle">Escuela profesional</text>
</svg>
